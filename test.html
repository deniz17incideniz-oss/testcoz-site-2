<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test — TestÇöz</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="quiz-page">

  <!-- HEADER -->
  <header class="site-header quiz-header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-icon">🧮</span>
        <span class="logo-text">Test<strong>Çöz</strong></span>
      </a>
      <div class="quiz-header-right">
        <span class="quiz-topic-name" id="breadcrumbTitle">Yükleniyor...</span>
        <a href="javascript:history.back()" class="btn-back-header">← Geri</a>
      </div>
    </div>
  </header>

  <!-- PROGRESS BAR -->
  <div class="progress-bar-wrapper">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progressText">1 / 10</div>
  </div>

  <main class="quiz-main">
    <div class="quiz-container">

      <!-- QUIZ CARD -->
      <div class="quiz-card fade-in" id="quizCard">
        <div class="question-header">
          <span class="question-num" id="questionNum">Soru 1</span>
          <span class="question-badge">📝 Matematik</span>
        </div>
        <div class="question-text" id="questionText">Soru yükleniyor...</div>

        <div class="options-grid" id="optionsGrid">
          <!-- Options rendered by quiz.js -->
        </div>

        <!-- FEEDBACK -->
        <div class="feedback-box" id="feedbackBox" style="display:none">
          <span id="feedbackText"></span>
        </div>

        <!-- EXPLANATION -->
        <div class="explanation-box" id="explanationBox" style="display:none">
          <div class="explanation-label">💡 Açıklama</div>
          <div id="explanationText"></div>
        </div>

        <!-- NEXT BUTTON -->
        <button class="btn-next" id="nextBtn" style="display:none">
          Sonraki Soru →
        </button>
      </div>

      <!-- RESULTS SCREEN -->
      <div class="results-screen fade-in" id="resultsScreen" style="display:none">
        <div class="results-top">
          <div class="results-emoji">🎉</div>
          <h2>Test Tamamlandı!</h2>
        </div>

        <div class="results-score-box">
          <div class="score-circle" id="scoreCircle">0/10</div>
          <div class="score-text" id="scoreText">% Başarı</div>
          <div class="stars-box" id="starsBox">☆☆☆</div>
        </div>

        <div class="results-stats">
          <div class="stat-box correct-box">
            <div class="stat-icon">✅</div>
            <div class="stat-val" id="correctStat">0</div>
            <div class="stat-lbl">Doğru</div>
          </div>
          <div class="stat-box wrong-box">
            <div class="stat-icon">❌</div>
            <div class="stat-val" id="wrongStat">0</div>
            <div class="stat-lbl">Yanlış</div>
          </div>
        </div>

        <!-- WRONG REVIEW -->
        <div class="wrong-review" id="wrongReview" style="display:none">
          <h3>📋 Yanlış Cevapladıkların</h3>
          <div id="wrongReviewList"></div>
        </div>

        <!-- ACTION BUTTONS -->
        <div class="results-actions">
          <button class="btn btn-primary" id="restartBtn">🔄 Tekrar Çöz</button>
          <button class="btn btn-outline" id="backBtn">← Konulara Dön</button>
        </div>
      </div>

    </div>
  </main>

  <!-- Scripts: questions must load before quiz engine -->
  <script src="js/questions.js"></script>
  <script src="js/quiz.js"></script>
</body>
</html>
